<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveYukiL2D Minimal</title>
    <script src="/libs/live2dcubismcore.min.js"></script>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: system-ui, "Microsoft YaHei", sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: transparent;
      }
      #panel {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(20, 20, 24, 0.72);
        color: #fff;
        font-size: 13px;
        line-height: 1.6;
        backdrop-filter: blur(8px);
        user-select: none;
        display: none;
      }
      #subtitle {
        position: fixed;
        left: 50%;
        bottom: 36px;
        transform: translateX(-50%);
        max-width: 70vw;
        padding: 10px 16px;
        border-radius: 999px;
        background: transparent;
        color: white;
        font-size: 18px;
        text-align: center;
        white-space: pre-wrap;
        pointer-events: none;
      }
      button {
        margin: 4px 4px 0 0;
        border: 0;
        border-radius: 8px;
        padding: 5px 9px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="panel">
        <div><b>LiveYukiL2D Minimal</b></div>
        <div id="status">初始化中...</div>
        <button id="btn-reload">重载模型</button>
        <button id="btn-smile">表情 0</button>
        <button id="btn-info">调试信息</button>
      </div>
      <div id="subtitle"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
