<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveYukiL2D Minimal</title>
    <script src="/libs/live2dcubismcore.min.js"></script>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: system-ui, "Microsoft YaHei", sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      body.edit-mode #app {
        cursor: move;
      }
      body.edit-mode #app::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 30;
        box-sizing: border-box;
        border: 2px dashed rgba(80, 180, 255, 0.95);
        background:
          linear-gradient(90deg, rgba(80, 180, 255, 0.28), rgba(80, 180, 255, 0.28)) top left / 100% 12px no-repeat,
          linear-gradient(90deg, rgba(80, 180, 255, 0.28), rgba(80, 180, 255, 0.28)) bottom left / 100% 12px no-repeat,
          linear-gradient(0deg, rgba(80, 180, 255, 0.28), rgba(80, 180, 255, 0.28)) top left / 12px 100% no-repeat,
          linear-gradient(0deg, rgba(80, 180, 255, 0.28), rgba(80, 180, 255, 0.28)) top right / 12px 100% no-repeat;
        pointer-events: none;
      }
      body.edit-mode #app::after {
        content: "拖动内部移动 · 拖动边缘改大小 · 滚轮缩放模型";
        position: fixed;
        right: 10px;
        bottom: 10px;
        z-index: 31;
        padding: 5px 8px;
        border-radius: 8px;
        background: rgba(20, 20, 24, 0.78);
        color: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        pointer-events: none;
      }
      #canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: transparent;
        -webkit-app-region: no-drag;
      }
      body.edit-mode #canvas {
        pointer-events: none;
      }
      #panel {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(20, 20, 24, 0.72);
        color: #fff;
        font-size: 13px;
        line-height: 1.6;
        backdrop-filter: blur(8px);
        user-select: none;
        display: none;
        -webkit-app-region: no-drag;
      }
      #edit-hint {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(20, 20, 24, 0.78);
        color: #fff;
        font-size: 13px;
        line-height: 1.4;
        white-space: nowrap;
        user-select: none;
        pointer-events: none;
        backdrop-filter: blur(8px);
      }
      body.edit-mode #edit-hint {
        display: block;
      }
      #subtitle {
        position: fixed;
        left: 50%;
        bottom: 36px;
        transform: translateX(-50%);
        max-width: 70vw;
        padding: 10px 16px;
        border-radius: 999px;
        background: transparent;
        color: white;
        font-size: 18px;
        text-align: center;
        white-space: pre-wrap;
        pointer-events: none;
      }
      #chat {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 25;
        display: flex;
        gap: 6px;
        align-items: flex-end;
        -webkit-app-region: no-drag;
      }
      #chat-input {
        min-height: 34px;
        max-height: 110px;
        flex: 1;
        box-sizing: border-box;
        resize: vertical;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(20, 20, 24, 0.78);
        color: #fff;
        font: inherit;
        outline: none;
        backdrop-filter: blur(8px);
      }
      #chat-input:focus {
        border-color: rgba(120, 200, 255, 0.9);
      }
      #chat-send, #chat-cancel, #chat-clear {
        height: 34px;
        margin: 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(20, 20, 24, 0.78);
        color: #fff;
      }
      #chat-send:disabled, #chat-cancel:disabled {
        opacity: 0.45;
        cursor: default;
      }
      button {
        margin: 4px 4px 0 0;
        border: 0;
        border-radius: 8px;
        padding: 5px 9px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="panel">
        <div><b>LiveYukiL2D Minimal</b></div>
        <div id="status">初始化中...</div>
        <button id="btn-reload">重载模型</button>
        <button id="btn-smile">表情 0</button>
        <button id="btn-info">调试信息</button>
      </div>
      <div id="edit-hint">编辑模式：拖动内部移动窗口，拖拽蓝色边缘调整大小，滚轮缩放模型，按 Ctrl+Alt+Y 锁定</div>
      <div id="subtitle"></div>
      <form id="chat">
        <textarea id="chat-input" placeholder="和 Yuki 说点什么" maxlength="4000" rows="1"></textarea>
        <button id="chat-send" type="submit">发送</button>
        <button id="chat-cancel" type="button" disabled>中断</button>
        <button id="chat-clear" type="button">清空</button>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
